<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>Linter Control</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.js"></script>
  <style>
    :root{--bg:#0f1117;--surface:#1a1d27;--card:#22263a;--border:#2e3250;--accent:#BA7517;--accent2:#FAC775;--green:#3B6D11;--green2:#97C459;--red:#A32D2D;--red2:#F09595;--blue2:#85B7EB;--text:#eef0f7;--muted:#7a7f9a;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
    input,select,button,textarea{font-family:inherit;}
    .hidden{display:none!important;}
    #login{min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .login-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:36px 24px;width:100%;max-width:360px;}
    .logo{text-align:center;margin-bottom:28px;}
    .logo-icon{width:60px;height:60px;background:var(--accent);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 12px;}
    .logo h1{font-size:20px;font-weight:700;color:var(--accent2);}
    .field{margin-bottom:14px;}
    .field label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;}
    .field input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);padding:12px 14px;font-size:15px;outline:none;}
    .field input:focus{border-color:var(--accent);}
    .btn{cursor:pointer;border:none;border-radius:10px;font-weight:700;padding:12px 20px;transition:opacity .15s;}
    .btn:disabled{opacity:.5;cursor:not-allowed;}
    .btn-full{width:100%;}
    .btn-accent{background:var(--accent);color:#0f1117;}
    .btn-green{background:var(--green);color:#fff;}
    .btn-red{background:var(--red);color:#fff;}
    .btn-ghost{background:var(--card);border:1px solid var(--border);color:var(--muted);}
    .btn-sm{padding:6px 10px;font-size:12px;}
    #app{display:flex;flex-direction:column;min-height:100vh;}
    .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;}
    .topbar-left{display:flex;align-items:center;gap:10px;}
    .topbar-icon{width:34px;height:34px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;}
    .topbar-title{font-size:16px;font-weight:700;color:var(--accent2);}
    .topbar-user{font-size:11px;color:var(--muted);}
    .content{flex:1;padding:16px 16px 100px;max-width:680px;margin:0 auto;width:100%;}
    .section{margin-bottom:20px;}
    .section-title{font-size:16px;font-weight:700;margin-bottom:8px;}
    .section-desc{font-size:12px;color:var(--muted);margin-bottom:12px;}
    .map{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px;overflow-x:auto;}
    .map-grid{display:flex;flex-direction:column;gap:2px;min-width:600px;}
    .row{display:flex;gap:2px;align-items:center;}
    .cell{width:44px;height:48px;border:1px solid var(--border);border-radius:6px;background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:8px;text-align:center;padding:2px;flex-shrink:0;}
    .cell:hover{transform:scale(1.05);}
    .panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-top:12px;}
    .form-group{margin-bottom:12px;}
    .form-group label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:4px;text-transform:uppercase;}
    .form-group input,.form-group select,.form-group textarea{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;color:var(--text);padding:10px 12px;font-size:14px;outline:none;}
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent);}
    .hist-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;}
    .hist-badge{display:inline-block;font-size:10px;font-weight:800;padding:2px 8px;border-radius:5px;letter-spacing:1px;text-transform:uppercase;}
    .badge-in{background:#3B6D1144;color:var(--green2);}
    .badge-out{background:#A32D2D44;color:var(--red2);}
    .hist-lote{font-size:14px;font-weight:700;margin-top:4px;}
    .hist-meta{font-size:11px;color:var(--muted);margin-top:3px;}
    .hist-actions{display:flex;gap:6px;margin-top:8px;}
    .user-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
    .user-info{flex:1;}
    .user-name{font-size:14px;font-weight:700;}
    .user-role{font-size:10px;color:var(--muted);margin-top:3px;}
    .nav{display:flex;background:var(--surface);border-top:1px solid var(--border);position:fixed;bottom:0;left:0;right:0;}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 14px;font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;}
    .nav-item.active{color:var(--accent);font-weight:700;}
    .modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:999;align-items:center;justify-content:center;}
    .modal.show{display:flex;}
    .modal-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;max-width:400px;width:90%;max-height:80vh;overflow-y:auto;}
    .modal-title{font-size:16px;font-weight:700;margin-bottom:14px;}
    #toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:600;z-index:998;opacity:0;transition:opacity .3s;}
    #toast.show{opacity:1;}
  </style>
</head>
<body>

<div id="login">
  <div class="login-box">
    <div class="logo">
      <div class="logo-icon">🌾</div>
      <h1>LINTER CONTROL</h1>
    </div>
    <div id="err" style="color:var(--red2);font-size:12px;margin-bottom:14px;display:none;"></div>
    <div class="field"><label>Usuário</label><input id="user" type="text" placeholder="admin"/></div>
    <div class="field"><label>Senha</label><input id="pass" type="password" placeholder="••••••"/></div>
    <button class="btn btn-accent btn-full" onclick="login()">Entrar</button>
  </div>
</div>

<div id="app" class="hidden">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-icon">🌾</div>
      <div>
        <div class="topbar-title">Linter Control</div>
        <div class="topbar-user" id="user-info">—</div>
      </div>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="logout()">Sair</button>
  </div>

  <div class="content">
    <div id="mapa-tab">
      <div class="section-title">Mapa do armazém</div>
      <div class="map"><div class="map-grid" id="mapa"></div></div>
      <div id="bloco-panel" class="hidden"></div>
    </div>

    <div id="hist-tab" class="hidden">
      <div class="section-title">Histórico</div>
      <div id="historico"></div>
    </div>

    <div id="admin-tab" class="hidden">
      <div class="section"><div class="section-title">Usuários</div><div id="users-list"></div></div>
      <div class="section">
        <div class="section-title">Adicionar usuário</div>
        <div class="form-group"><label>Nome</label><input id="nu-nome"/></div>
        <div class="form-group"><label>Login</label><input id="nu-login"/></div>
        <div class="form-group"><label>Senha</label><input id="nu-senha" type="password"/></div>
        <div class="form-group"><label>Perfil</label><select id="nu-role"><option value="operador">Operador</option><option value="admin">Admin</option></select></div>
        <button class="btn btn-accent btn-full" onclick="addUser()">Adicionar</button>
      </div>
    </div>
  </div>

  <nav class="nav">
    <button class="nav-item active" data-tab="mapa" onclick="switchTab('mapa')">🗺️ Mapa</button>
    <button class="nav-item" data-tab="hist" onclick="switchTab('hist')">📋 Histórico</button>
    <button class="nav-item" id="admin-btn" data-tab="admin" onclick="switchTab('admin')">⚙️ Admin</button>
  </nav>
</div>

<div id="modal-edit" class="modal">
  <div class="modal-box">
    <div class="modal-title">Editar movimentação</div>
    <div class="form-group"><label>Observação</label><textarea id="edt-obs"></textarea></div>
    <div class="form-group"><label>NF</label><input id="edt-nf"/></div>
    <button class="btn btn-green btn-full" onclick="saveEdit()" style="margin-bottom:6px;">Salvar</button>
    <button class="btn btn-ghost btn-full" onclick="closeModal()">Cancelar</button>
  </div>
</div>

<div id="modal-user" class="modal">
  <div class="modal-box">
    <div class="modal-title">Editar usuário</div>
    <div class="form-group"><label>Nome</label><input id="edt-nome"/></div>
    <div class="form-group"><label>Login</label><input id="edt-login"/></div>
    <div class="form-group"><label>Senha (deixe vazio para não mudar)</label><input id="edt-senha" type="password"/></div>
    <div class="form-group"><label>Perfil</label><select id="edt-role"><option value="operador">Operador</option><option value="admin">Admin</option></select></div>
    <button class="btn btn-green btn-full" onclick="saveUser()" style="margin-bottom:6px;">Salvar</button>
    <button class="btn btn-ghost btn-full" onclick="closeModal()">Cancelar</button>
  </div>
</div>

<div id="toast"></div>

<script>
const SUPABASE_URL='https://ajepmbvafshcyhvtysvb.supabase.co';
const SUPABASE_KEY='sb_publishable_5N_4oXK1pIre2P_nA50GQQ_njLv8Xwr';
const {createClient}=supabase;
const sb=createClient(SUPABASE_URL,SUPABASE_KEY);

let user=null,blocos=[],lotes=[],historico=[],usuarios=[];
let editId=null,editUserId=null;
const RUAS=['Y','X','W','V','U','T','S','R','Q','P','O','N','M','L','K','J','I','H','G','F','E','D','C','B','A'];

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.className='show';t.style.borderColor='var(--green2)';t.style.color='var(--green2)';setTimeout(()=>t.className='',2500);}
function err(msg){const t=document.getElementById('toast');t.textContent=msg;t.className='show';t.style.borderColor='var(--red2)';t.style.color='var(--red2)';setTimeout(()=>t.className='',2500);}

async function login(){
  const username=document.getElementById('user').value;
  const password=document.getElementById('pass').value;
  const e=document.getElementById('err');
  if(!username||!password){e.textContent='Preencha tudo';e.style.display='block';return;}
  try{
    const {data,error}=await sb.from('usuarios').select('*').eq('login',username).eq('senha',password).eq('ativo',true).single();
    if(error||!data){e.textContent='Inválido';e.style.display='block';return;}
    user=data;
    e.style.display='none';
    document.getElementById('login').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    document.getElementById('user-info').textContent=user.nome+' ('+user.role+')';
    if(user.role!=='admin')document.getElementById('admin-btn').style.display='none';
    loadAll();
  }catch(ex){e.textContent='Erro';e.style.display='block';}
}

function logout(){user=null;document.getElementById('app').classList.add('hidden');document.getElementById('login').classList.remove('hidden');document.getElementById('pass').value='';}

function switchTab(tab){
  document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
  document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
  document.getElementById('mapa-tab').classList.toggle('hidden',tab!=='mapa');
  document.getElementById('hist-tab').classList.toggle('hidden',tab!=='hist');
  document.getElementById('admin-tab').classList.toggle('hidden',tab!=='admin');
  if(tab==='hist')renderHist();
  if(tab==='admin')renderAdmin();
}

async function loadAll(){
  const {data:b}=await sb.from('blocos').select('*');blocos=b||[];
  const {data:l}=await sb.from('lotes').select('*');lotes=l||[];
  const {data:h}=await sb.from('historico').select('*').order('quando',{ascending:false}).limit(200);historico=h||[];
  const {data:u}=await sb.from('usuarios').select('*');usuarios=u||[];
  renderMapa();
}

function renderMapa(){
  const m=document.getElementById('mapa');
  m.innerHTML='';
  RUAS.forEach(rua=>{
    const row=document.createElement('div');
    row.className='row';
    const ruaLabel=document.createElement('div');
    ruaLabel.style.width='24px';ruaLabel.style.fontSize='10px';ruaLabel.style.fontWeight='700';ruaLabel.textContent=rua;
    row.appendChild(ruaLabel);
    for(let av=1;av<=17;av++){
      const b=blocos.find(x=>x.rua===rua&&x.avenida===av);
      const tot=b?lotes.filter(l=>l.bloco_id===b.id).reduce((s,l)=>s+l.fardos,0):0;
      const cell=document.createElement('div');
      cell.className='cell';
      cell.innerHTML=tot>0?`<small>${tot}</small>`:'';
      if(b){
        cell.style.cursor='pointer';
        cell.onclick=()=>showBloco(b.id);
        if(tot>0)cell.style.background='#BA751755';
      }
      row.appendChild(cell);
    }
    m.appendChild(row);
  });
}

function showBloco(bid){
  const b=blocos.find(x=>x.id===bid);
  const ls=lotes.filter(x=>x.bloco_id===bid);
  const tot=ls.reduce((s,l)=>s+l.fardos,0);
  const livre=140-tot;
  const panel=document.getElementById('bloco-panel');
  panel.innerHTML=`
    <div class="panel">
      <div style="margin-bottom:12px;">
        <div style="font-size:16px;font-weight:700;">Rua ${b.rua} — Av ${b.avenida}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px;">${tot}/140 fardos · ${livre} livres</div>
      </div>
      ${ls.map(l=>`<div style="background:var(--bg);padding:8px;border-radius:8px;margin-bottom:6px;font-size:12px;"><strong>${l.lote}</strong> - ${l.produto} (${l.fardos})</div>`).join('')}
    </div>
  `;
  panel.classList.remove('hidden');
}

function renderHist(){
  const h=document.getElementById('historico');
  h.innerHTML=historico.map(x=>`
    <div class="hist-item">
      <span class="hist-badge ${x.acao==='ENTRADA'?'badge-in':'badge-out'}">${x.acao}</span>
      <div class="hist-lote">${x.lote}</div>
      <div class="hist-meta">Produto: ${x.produto||'—'}</div>
      <div class="hist-meta">Usuário: ${x.usuario_nome}</div>
      <div class="hist-meta">Data: ${new Date(x.quando).toLocaleString('pt-BR')}</div>
      ${x.numero_nf?`<div class="hist-meta">NF: ${x.numero_nf}</div>`:''}
      ${x.observacao?`<div class="hist-meta">📝 ${x.observacao}</div>`:''}
      ${user.role==='admin'?`<div class="hist-actions"><button class="btn btn-sm btn-accent" onclick="openEditHist(${x.id})">Editar</button><button class="btn btn-sm btn-red" onclick="delHist(${x.id})">Excluir</button></div>`:''}
    </div>
  `).join('');
}

function openEditHist(id){
  editId=id;
  const x=historico.find(h=>h.id===id);
  if(!x)return;
  document.getElementById('edt-obs').value=x.observacao||'';
  document.getElementById('edt-nf').value=x.numero_nf||'';
  document.getElementById('modal-edit').classList.add('show');
}

async function saveEdit(){
  if(!editId)return;
  try{
    await sb.from('historico').update({observacao:document.getElementById('edt-obs').value||null,numero_nf:document.getElementById('edt-nf').value||null}).eq('id',editId);
    await loadAll();renderHist();toast('Editado');closeModal();
  }catch{err('Erro');}
}

async function delHist(id){
  if(!confirm('Excluir?'))return;
  try{
    await sb.from('historico').delete().eq('id',id);
    await loadAll();renderHist();toast('Excluído');
  }catch{err('Erro');}
}

function renderAdmin(){
  const u=document.getElementById('users-list');
  u.innerHTML=usuarios.map(x=>`
    <div class="user-item">
      <div class="user-info"><div class="user-name">${x.nome}</div><div class="user-role">${x.login} • ${x.role}</div></div>
      <button class="btn btn-sm btn-ghost" onclick="openEditUser(${x.id})">✎</button>
      <button class="btn btn-sm btn-ghost" onclick="delUser(${x.id})">🗑️</button>
    </div>
  `).join('');
}

function openEditUser(id){
  editUserId=id;
  const x=usuarios.find(u=>u.id===id);
  if(!x)return;
  document.getElementById('edt-nome').value=x.nome;
  document.getElementById('edt-login').value=x.login;
  document.getElementById('edt-senha').value='';
  document.getElementById('edt-role').value=x.role;
  document.getElementById('modal-user').classList.add('show');
}

async function saveUser(){
  if(!editUserId)return;
  const upd={nome:document.getElementById('edt-nome').value,login:document.getElementById('edt-login').value,role:document.getElementById('edt-role').value};
  const pwd=document.getElementById('edt-senha').value;
  if(pwd)upd.senha=pwd;
  try{
    await sb.from('usuarios').update(upd).eq('id',editUserId);
    await loadAll();renderAdmin();toast('Usuário atualizado');closeModal();
  }catch{err('Erro');}
}

async function delUser(id){
  if(!confirm('Excluir usuário?'))return;
  try{
    await sb.from('usuarios').delete().eq('id',id);
    await loadAll();renderAdmin();toast('Excluído');
  }catch{err('Erro');}
}

async function addUser(){
  const nome=document.getElementById('nu-nome').value;
  const login=document.getElementById('nu-login').value;
  const senha=document.getElementById('nu-senha').value;
  const role=document.getElementById('nu-role').value;
  if(!nome||!login||!senha){err('Preencha tudo');return;}
  try{
    await sb.from('usuarios').insert({nome,login,senha,role});
    await loadAll();renderAdmin();toast('Adicionado');
    document.getElementById('nu-nome').value='';
    document.getElementById('nu-login').value='';
    document.getElementById('nu-senha').value='';
  }catch{err('Erro');}
}

function closeModal(){document.querySelectorAll('.modal').forEach(x=>x.classList.remove('show'));editId=null;editUserId=null;}
document.getElementById('pass').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
</script>
</body>
</html>

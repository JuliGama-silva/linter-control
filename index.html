<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>Linter Control</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.js"></script>
  <style>
    :root{--bg:#0f1117;--surface:#1a1d27;--card:#22263a;--border:#2e3250;--accent:#BA7517;--accent2:#FAC775;--green:#3B6D11;--green2:#97C459;--red:#A32D2D;--red2:#F09595;--blue2:#85B7EB;--text:#eef0f7;--muted:#7a7f9a;--font:'Segoe UI',system-ui,sans-serif;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overscroll-behavior:none;}
    input,select,button,textarea{font-family:var(--font);}
    .hidden{display:none!important;}
    #login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
    .login-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:36px 24px;width:100%;max-width:360px;}
    .login-logo{text-align:center;margin-bottom:28px;}
    .login-icon{width:60px;height:60px;background:var(--accent);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:28px;}
    .login-logo h1{font-size:20px;font-weight:700;color:var(--accent2);letter-spacing:1px;}
    .login-logo p{font-size:13px;color:var(--muted);margin-top:4px;}
    .field{margin-bottom:14px;}
    .field label{display:block;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;margin-bottom:5px;text-transform:uppercase;}
    .field input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);padding:12px 14px;font-size:15px;outline:none;transition:border-color .2s;}
    .field input:focus{border-color:var(--accent);}
    .btn{cursor:pointer;border:none;border-radius:10px;font-weight:700;font-size:15px;padding:13px 20px;transition:opacity .15s;}
    .btn:disabled{opacity:.5;cursor:not-allowed;}
    .btn-full{width:100%;}
    .btn-accent{background:var(--accent);color:#0f1117;}
    .btn-green{background:var(--green);color:#fff;}
    .btn-red{background:var(--red);color:#fff;}
    .btn-ghost{background:var(--card);border:1px solid var(--border);color:var(--muted);}
    .btn-sm{padding:6px 10px;font-size:12px;}
    .alert{border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:14px;}
    .alert-err{background:#A32D2D22;border:1px solid #A32D2D44;color:var(--red2);}
    #app-screen{display:flex;flex-direction:column;min-height:100vh;}
    .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
    .topbar-left{display:flex;align-items:center;gap:10px;}
    .topbar-icon{width:34px;height:34px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;}
    .topbar-title{font-size:16px;font-weight:700;color:var(--accent2);}
    .topbar-user{font-size:11px;color:var(--muted);}
    .topbar-role{font-size:10px;color:var(--accent2);font-weight:600;margin-top:2px;}
    .nav-bar{display:flex;background:var(--surface);border-top:1px solid var(--border);position:fixed;bottom:0;left:0;right:0;z-index:100;}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 14px;font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;transition:color .15s;}
    .nav-item .ni{font-size:22px;margin-bottom:3px;display:block;}
    .nav-item.active{color:var(--accent);font-weight:700;}
    .nav-item.hidden-nav{display:none;}
    .content{flex:1;padding:16px 16px 100px;max-width:680px;margin:0 auto;width:100%;}
    .sec-header{margin-bottom:16px;}
    .sec-header h2{font-size:18px;font-weight:700;}
    .sec-header p{font-size:13px;color:var(--muted);margin-top:3px;}
    .sec-title{font-size:14px;font-weight:700;margin-bottom:10px;}
    .divider{height:1px;background:var(--border);margin:16px 0;}
    .user-row{display:flex;justify-content:space-between;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:7px;}
    .user-info{flex:1;}
    .user-name{font-size:14px;font-weight:700;}
    .user-meta{font-size:11px;color:var(--muted);margin-top:2px;}
    .user-actions{display:flex;gap:6px;}
    .role-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;letter-spacing:1px;text-transform:uppercase;}
    .role-admin{background:#BA751733;color:var(--accent2);border:1px solid #BA751766;}
    .role-op{background:#185FA533;color:var(--blue2);border:1px solid #185FA566;}
    .hist-row{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:7px;}
    .hist-top{display:flex;justify-content:space-between;align-items:flex-start;}
    .badge{display:inline-block;font-size:10px;font-weight:800;padding:2px 8px;border-radius:5px;letter-spacing:1px;text-transform:uppercase;}
    .badge-in{background:#3B6D1144;color:var(--green2);border:1px solid #3B6D1166;}
    .badge-out{background:#A32D2D44;color:var(--red2);border:1px solid #A32D2D66;}
    .hist-lote{font-size:13px;font-weight:700;margin-top:3px;}
    .hist-meta{font-size:11px;color:var(--muted);margin-top:2px;}
    .hist-qty{font-size:18px;font-weight:800;margin-left:10px;}
    .hist-actions{display:flex;gap:6px;margin-top:8px;}
    .btn-edit{background:var(--accent);color:#0f1117;padding:4px 8px;border-radius:6px;border:none;cursor:pointer;font-size:11px;font-weight:600;}
    .btn-delete{background:var(--red);color:#fff;padding:4px 8px;border-radius:6px;border:none;cursor:pointer;font-size:11px;font-weight:600;}
    .ff{margin-bottom:12px;}
    .ff label{display:block;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;margin-bottom:5px;text-transform:uppercase;}
    .ff input,.ff select,.ff textarea{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);padding:11px 14px;font-size:14px;outline:none;transition:border-color .2s;}
    .ff input:focus,.ff select:focus,.ff textarea:focus{border-color:var(--accent);}
    .modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center;}
    .modal.show{display:flex;}
    .modal-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;max-width:400px;width:90%;max-height:80vh;overflow-y:auto;}
    .modal-title{font-size:16px;font-weight:700;margin-bottom:14px;}
    #toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 20px;font-size:13px;font-weight:600;z-index:999;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap;}
    #toast.show{opacity:1;}
    #toast.ok{border-color:var(--green2);color:var(--green2);}
    #toast.err{border-color:var(--red2);color:var(--red2);}
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-icon">🌾</div>
      <h1>LINTER CONTROL</h1>
      <p>Sistema de controle de fardos</p>
    </div>
    <div id="login-err" class="alert alert-err hidden"></div>
    <div class="field"><label>Usuário</label><input id="li-user" type="text" placeholder="ex: admin" autocomplete="username"/></div>
    <div class="field"><label>Senha</label><input id="li-pass" type="password" placeholder="••••••" autocomplete="current-password"/></div>
    <button class="btn btn-accent btn-full" id="btn-login">Entrar</button>
  </div>
</div>

<div id="app-screen" class="hidden">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-icon">🌾</div>
      <div>
        <div class="topbar-title">Linter Control</div>
        <div class="topbar-user" id="topbar-user">—</div>
        <div class="topbar-role" id="topbar-role">—</div>
      </div>
    </div>
    <button class="btn btn-ghost" id="btn-logout" style="padding:7px 14px;font-size:13px;">Sair</button>
  </div>

  <div class="content">
    <div id="tab-admin" class="hidden">
      <div class="sec-header"><h2>Administração</h2><p>Gestão de usuários</p></div>
      <div class="sec-title">Usuários cadastrados</div>
      <div id="admin-users"></div>
      <div class="divider"></div>
      <div class="sec-title">Adicionar novo usuário</div>
      <div class="ff"><label>Nome completo</label><input id="nu-nome" placeholder="Ex: João Silva"></div>
      <div class="ff"><label>Login</label><input id="nu-login" placeholder="Ex: joao"></div>
      <div class="ff"><label>Senha</label><input id="nu-senha" type="password" placeholder="••••••"></div>
      <div class="ff"><label>Perfil</label>
        <select id="nu-role"><option value="operador">Operador</option><option value="admin">Administrador</option></select>
      </div>
      <button class="btn btn-accent btn-full" id="btn-add-user">Adicionar usuário</button>
    </div>

    <div id="tab-historico">
      <div class="sec-header"><h2>Histórico de movimentações</h2></div>
      <div id="historico-list"></div>
    </div>
  </div>

  <nav class="nav-bar">
    <button class="nav-item active" data-tab="historico"><span class="ni">📋</span>Histórico</button>
    <button class="nav-item" id="nav-admin" data-tab="admin"><span class="ni">⚙️</span>Admin</button>
  </nav>
</div>

<div id="modal-edit-user" class="modal">
  <div class="modal-box">
    <div class="modal-title">Editar usuário</div>
    <div class="ff"><label>Nome completo</label><input id="edit-nome" placeholder="Nome"></div>
    <div class="ff"><label>Login</label><input id="edit-login" placeholder="Login"></div>
    <div class="ff"><label>Senha nova (deixe em branco para não alterar)</label><input id="edit-senha" type="password" placeholder="••••••"></div>
    <div class="ff"><label>Perfil</label>
      <select id="edit-role"><option value="operador">Operador</option><option value="admin">Administrador</option></select>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-green btn-full" id="btn-save-user">Salvar</button>
      <button class="btn btn-ghost btn-full" id="btn-cancel-user">Cancelar</button>
    </div>
  </div>
</div>

<div id="modal-edit-hist" class="modal">
  <div class="modal-box">
    <div class="modal-title">Editar movimentação</div>
    <div class="ff"><label>Observação</label><textarea id="edit-obs" placeholder="Atualizar observação…"></textarea></div>
    <div class="ff"><label>Número NF</label><input id="edit-nf" placeholder="NF"></div>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-green btn-full" id="btn-save-hist">Salvar</button>
      <button class="btn btn-ghost btn-full" id="btn-cancel-hist">Cancelar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const SUPABASE_URL='https://ajepmbvafshcyhvtysvb.supabase.co';
const SUPABASE_ANON='sb_publishable_5N_4oXK1pIre2P_nA50GQQ_njLv8Xwr';
const {createClient}=supabase;
const sb=createClient(SUPABASE_URL,SUPABASE_ANON);

let currentUser=null,historico=[],usuarios=[];
let editingUserId=null,editingHistId=null;

function toast(msg,type='ok'){const t=document.getElementById('toast');t.textContent=msg;t.className=`show ${type}`;clearTimeout(t._t);t._t=setTimeout(()=>t.className='',3000);}
const isAdmin=()=>currentUser?.role==='admin';

async function loadAll(){await Promise.all([loadHistorico(),loadUsuarios()]);}
async function loadHistorico(){const {data}=await sb.from('historico').select('*').order('quando',{ascending:false}).limit(300);historico=data||[];}
async function loadUsuarios(){if(!isAdmin())return;const {data}=await sb.from('usuarios').select('*').order('nome');usuarios=data||[];}

document.getElementById('li-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('btn-login').addEventListener('click',doLogin);
document.getElementById('btn-logout').addEventListener('click',doLogout);

async function doLogin(){
  const login=document.getElementById('li-user').value.trim();
  const senha=document.getElementById('li-pass').value;
  const err=document.getElementById('login-err');
  err.classList.add('hidden');
  if(!login||!senha){err.textContent='Preencha usuário e senha.';err.classList.remove('hidden');return;}
  document.getElementById('btn-login').disabled=true;
  try{
    const {data,error}=await sb.from('usuarios').select('*').eq('login',login).eq('senha',senha).eq('ativo',true).single();
    if(error||!data){err.textContent='Usuário ou senha incorretos.';err.classList.remove('hidden');return;}
    currentUser=data;
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app-screen').classList.remove('hidden');
    document.getElementById('topbar-user').textContent=data.nome;
    document.getElementById('topbar-role').textContent=data.role==='admin'?'Administrador':'Operador';
    if(!isAdmin())document.getElementById('nav-admin').classList.add('hidden-nav');
    await loadAll();showTab('historico');
  }catch{err.textContent='Erro de conexão.';err.classList.remove('hidden');}
  finally{document.getElementById('btn-login').disabled=false;}
}
function doLogout(){currentUser=null;historico=[];usuarios=[];document.getElementById('app-screen').classList.add('hidden');document.getElementById('login-screen').classList.remove('hidden');document.getElementById('li-pass').value='';}

document.querySelectorAll('.nav-item').forEach(el=>el.addEventListener('click',()=>showTab(el.dataset.tab)));
function showTab(tab){document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.tab===tab));['historico','admin'].forEach(t=>document.getElementById(`tab-${t}`).classList.toggle('hidden',t!==tab));if(tab==='historico')renderHistorico();if(tab==='admin')renderAdmin();}

function renderHistorico(){
  const el=document.getElementById('historico-list');
  if(!historico.length){el.innerHTML=`<div style="text-align:center;color:var(--muted);padding:32px;">Nenhuma movimentação registrada.</div>`;return;}
  el.innerHTML=historico.slice(0,200).map(h=>`
    <div class="hist-row">
      <div class="hist-top">
        <div style="flex:1">
          <span class="badge ${h.acao==='ENTRADA'?'badge-in':'badge-out'}">${h.acao}</span>
          <div class="hist-lote">${h.lote}</div>
          <div class="hist-meta">Produto: <strong>${h.produto||''}</strong></div>
          <div class="hist-meta">Usuário: <strong>${h.usuario_nome}</strong></div>
          <div class="hist-meta">Data: <strong>${new Date(h.quando).toLocaleString('pt-BR')}</strong></div>
          ${h.numero_nf?`<div class="hist-meta">📄 NF: ${h.numero_nf}</div>`:''}
        </div>
        <div class="hist-qty" style="color:${h.acao==='ENTRADA'?'var(--green2)':'var(--red2)'}">${h.acao==='ENTRADA'?'+':'-'}${h.fardos}</div>
      </div>
      ${h.observacao?`<div style="font-size:12px;color:var(--muted);margin-top:7px;padding-top:7px;border-top:1px solid var(--border);font-style:italic;">📝 ${h.observacao}</div>`:''}
      ${isAdmin()?`<div class="hist-actions"><button class="btn-edit" data-id="${h.id}">Editar</button><button class="btn-delete" data-id="${h.id}" data-lote="${h.lote}">Excluir</button></div>`:''}
    </div>
  `).join('');
  
  el.querySelectorAll('.btn-edit').forEach(btn=>{btn.addEventListener('click',()=>openEditHist(parseInt(btn.dataset.id)));});
  el.querySelectorAll('.btn-delete').forEach(btn=>{btn.addEventListener('click',()=>deleteHist(parseInt(btn.dataset.id),btn.dataset.lote));});
}

function openEditHist(id){
  editingHistId=id;
  const h=historico.find(x=>x.id===id);
  if(!h)return;
  document.getElementById('edit-obs').value=h.observacao||'';
  document.getElementById('edit-nf').value=h.numero_nf||'';
  document.getElementById('modal-edit-hist').classList.add('show');
}
document.getElementById('btn-save-hist').onclick=async()=>{
  const obs=document.getElementById('edit-obs').value.trim()||null;
  const nf=document.getElementById('edit-nf').value.trim()||null;
  document.getElementById('btn-save-hist').disabled=true;
  try{
    await sb.from('historico').update({observacao:obs,numero_nf:nf}).eq('id',editingHistId);
    await loadHistorico();
    toast('✅ Movimentação editada!');
    document.getElementById('modal-edit-hist').classList.remove('show');
    editingHistId=null;
    renderHistorico();
  }catch{toast('Erro ao editar.','err');}
  finally{document.getElementById('btn-save-hist').disabled=false;}
};
document.getElementById('btn-cancel-hist').onclick=()=>{document.getElementById('modal-edit-hist').classList.remove('show');editingHistId=null;};

async function deleteHist(id,lote){
  if(!confirm(`Tem certeza que deseja excluir a movimentação de ${lote}?`))return;
  try{
    await sb.from('historico').delete().eq('id',id);
    await loadHistorico();
    toast('✅ Movimentação excluída!');
    renderHistorico();
  }catch{toast('Erro ao excluir.','err');}
}

function renderAdmin(){
  const el=document.getElementById('admin-users');
  el.innerHTML=usuarios.map(u=>`
    <div class="user-row">
      <div class="user-info">
        <div class="user-name">${u.nome}</div>
        <div class="user-meta">Login: ${u.login}</div>
      </div>
      <div class="user-actions">
        <span class="role-badge ${u.role==='admin'?'role-admin':'role-op'}">${u.role}</span>
        <button class="btn btn-ghost btn-sm" data-id="${u.id}">✎</button>
        <button class="btn btn-ghost btn-sm" data-id="${u.id}" style="color:var(--red2);">🗑️</button>
      </div>
    </div>
  `).join('');
  
  el.querySelectorAll('button').forEach(btn=>{
    if(btn.textContent==='✎'){btn.addEventListener('click',()=>openEditUser(parseInt(btn.dataset.id)));}
    else if(btn.textContent==='🗑️'){btn.addEventListener('click',()=>deleteUser(parseInt(btn.dataset.id)));}
  });

  document.getElementById('btn-add-user').onclick=async()=>{
    const nome=document.getElementById('nu-nome').value.trim();
    const login=document.getElementById('nu-login').value.trim().toLowerCase();
    const senha=document.getElementById('nu-senha').value;
    const role=document.getElementById('nu-role').value;
    if(!nome||!login||!senha)return toast('Preencha todos os campos.','err');
    document.getElementById('btn-add-user').disabled=true;
    try{
      const {error}=await sb.from('usuarios').insert({nome,login,senha,role});
      if(error){toast('Erro: login já existe.','err');return;}
      await loadUsuarios();
      toast('✅ Usuário adicionado!');
      renderAdmin();
      document.getElementById('nu-nome').value='';
      document.getElementById('nu-login').value='';
      document.getElementById('nu-senha').value='';
    }catch{toast('Erro ao salvar.','err');}
    finally{document.getElementById('btn-add-user').disabled=false;}
  };
}

function openEditUser(id){
  editingUserId=id;
  const u=usuarios.find(x=>x.id===id);
  if(!u)return;
  document.getElementById('edit-nome').value=u.nome;
  document.getElementById('edit-login').value=u.login;
  document.getElementById('edit-senha').value='';
  document.getElementById('edit-role').value=u.role;
  document.getElementById('modal-edit-user').classList.add('show');
}
document.getElementById('btn-save-user').onclick=async()=>{
  const nome=document.getElementById('edit-nome').value.trim();
  const login=document.getElementById('edit-login').value.trim().toLowerCase();
  const senha=document.getElementById('edit-senha').value;
  const role=document.getElementById('edit-role').value;
  if(!nome||!login)return toast('Nome e login são obrigatórios.','err');
  document.getElementById('btn-save-user').disabled=true;
  try{
    const upd={nome,login,role};
    if(senha)upd.senha=senha;
    await sb.from('usuarios').update(upd).eq('id',editingUserId);
    await loadUsuarios();
    toast('✅ Usuário atualizado!');
    document.getElementById('modal-edit-user').classList.remove('show');
    editingUserId=null;
    renderAdmin();
  }catch{toast('Erro ao atualizar.','err');}
  finally{document.getElementById('btn-save-user').disabled=false;}
};
document.getElementById('btn-cancel-user').onclick=()=>{document.getElementById('modal-edit-user').classList.remove('show');editingUserId=null;};

async function deleteUser(id){
  if(!confirm('Tem certeza que deseja excluir este usuário?'))return;
  try{
    await sb.from('usuarios').delete().eq('id',id);
    await loadUsuarios();
    toast('✅ Usuário excluído!');
    renderAdmin();
  }catch{toast('Erro ao excluir.','err');}
}
</script>
</body>
</html>

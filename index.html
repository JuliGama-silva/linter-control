<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>Linter Control</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.js"></script>
  <style>
    :root{
      --bg:#0f1117;--surface:#1a1d27;--card:#22263a;--border:#2e3250;
      --accent:#BA7517;--accent2:#FAC775;
      --green:#3B6D11;--green2:#97C459;
      --red:#A32D2D;--red2:#F09595;
      --blue2:#85B7EB;--text:#eef0f7;--muted:#7a7f9a;
      --font:'Segoe UI',system-ui,sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overscroll-behavior:none;}
    input,select,button,textarea{font-family:var(--font);}
    .hidden{display:none!important;}
    #login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
    .login-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:36px 24px;width:100%;max-width:360px;}
    .login-logo{text-align:center;margin-bottom:28px;}
    .login-icon{width:60px;height:60px;background:var(--accent);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:28px;}
    .login-logo h1{font-size:20px;font-weight:700;color:var(--accent2);letter-spacing:1px;}
    .login-logo p{font-size:13px;color:var(--muted);margin-top:4px;}
    .field{margin-bottom:14px;}
    .field label{display:block;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;margin-bottom:5px;text-transform:uppercase;}
    .field input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);padding:12px 14px;font-size:15px;outline:none;transition:border-color .2s;}
    .field input:focus{border-color:var(--accent);}
    .btn{cursor:pointer;border:none;border-radius:10px;font-weight:700;font-size:15px;padding:13px 20px;transition:opacity .15s;}
    .btn:disabled{opacity:.5;cursor:not-allowed;}
    .btn-full{width:100%;}
    .btn-accent{background:var(--accent);color:#0f1117;}
    .btn-green{background:var(--green);color:#fff;}
    .btn-red{background:var(--red);color:#fff;}
    .btn-ghost{background:var(--card);border:1px solid var(--border);color:var(--muted);}
    .alert{border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:14px;}
    .alert-err{background:#A32D2D22;border:1px solid #A32D2D44;color:var(--red2);}
    #app-screen{display:flex;flex-direction:column;min-height:100vh;}
    .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
    .topbar-left{display:flex;align-items:center;gap:10px;}
    .topbar-icon{width:34px;height:34px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;}
    .topbar-title{font-size:16px;font-weight:700;color:var(--accent2);}
    .topbar-user{font-size:11px;color:var(--muted);}
    .nav-bar{display:flex;background:var(--surface);border-top:1px solid var(--border);position:fixed;bottom:0;left:0;right:0;z-index:100;}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 14px;font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;transition:color .15s;}
    .nav-item .ni{font-size:22px;margin-bottom:3px;display:block;}
    .nav-item.active{color:var(--accent);font-weight:700;}
    .content{flex:1;padding:16px 16px 100px;max-width:680px;margin:0 auto;width:100%;}
    .sec-header{margin-bottom:16px;}
    .sec-header h2{font-size:18px;font-weight:700;}
    .sec-header p{font-size:13px;color:var(--muted);margin-top:3px;}
    .sec-title{font-size:14px;font-weight:700;margin-bottom:10px;}
    .divider{height:1px;background:var(--border);margin:16px 0;}
    .empty-msg{text-align:center;color:var(--muted);font-size:13px;padding:32px;}

    /* LEGEND */
    .legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
    .leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);}
    .leg-dot{width:11px;height:11px;border-radius:3px;flex-shrink:0;}

    /* MAP */
    .map-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px;overflow:auto;}
    .map-inner{min-width:560px;}
    .av-row{display:flex;padding-left:26px;margin-bottom:3px;}
    .av-num{width:46px;flex-shrink:0;text-align:center;font-size:9px;font-weight:600;color:var(--muted);}
    .rua-row{display:flex;align-items:center;margin-bottom:2px;}
    .rua-lbl{width:26px;flex-shrink:0;text-align:center;font-size:10px;font-weight:600;color:var(--muted);}
    .cell{width:46px;height:50px;flex-shrink:0;border-radius:5px;margin:0 1px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2px;cursor:pointer;border:1.5px solid var(--border);transition:transform .1s;background:var(--card);}
    .cell:hover{transform:scale(1.08);z-index:2;position:relative;}
    .cell.selected{box-shadow:0 0 0 2.5px var(--accent2);}
    .cell-lote{font-size:7px;font-weight:600;line-height:1.2;text-align:center;max-width:42px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
    .cell-prod{font-size:6.5px;text-align:center;max-width:42px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
    .cell-qty{font-size:9px;font-weight:700;margin-top:1px;}
    .sep-cell{width:12px;flex-shrink:0;}
    .inicio-bar{text-align:center;margin-top:8px;font-size:10px;font-weight:600;color:var(--muted);letter-spacing:3px;padding:6px 0;border-top:1px solid var(--border);}

    /* PANEL */
    .panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-top:14px;}
    .panel-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
    .panel-title{font-size:16px;font-weight:700;}
    .panel-sub{font-size:12px;color:var(--muted);margin-top:3px;}
    .prog-wrap{background:var(--border);border-radius:6px;height:7px;margin-bottom:14px;overflow:hidden;}
    .prog-fill{height:100%;border-radius:6px;transition:width .3s;}
    .action-tabs{display:flex;gap:6px;margin-bottom:14px;}
    .action-tab{flex:1;padding:8px 4px;font-size:12px;font-weight:700;background:var(--card);border:1px solid var(--border);border-radius:8px;cursor:pointer;color:var(--muted);text-align:center;}
    .action-tab.active{background:var(--accent);color:#0f1117;border-color:var(--accent);}
    .lote-row{display:flex;justify-content:space-between;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 14px;margin-bottom:7px;cursor:pointer;}
    .lote-row.sel{border-color:var(--accent);background:#BA751722;}
    .lote-name{font-size:14px;font-weight:700;}
    .lote-meta{font-size:11px;color:var(--muted);margin-top:2px;}
    .lote-qty{font-size:18px;font-weight:800;color:var(--accent2);}

    /* FORMS */
    .ff{margin-bottom:12px;}
    .ff label{display:block;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;margin-bottom:5px;text-transform:uppercase;}
    .ff input,.ff select,.ff textarea{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);padding:11px 14px;font-size:14px;outline:none;transition:border-color .2s;}
    .ff input:focus,.ff select:focus,.ff textarea:focus{border-color:var(--accent);}
    .ff textarea{resize:vertical;min-height:68px;}
    .ff select option{background:var(--bg);}

    /* STATS */
    .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
    .stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 12px;}
    .stat-label{font-size:11px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px;}
    .stat-value{font-size:28px;font-weight:800;}
    .stat-sub{font-size:11px;color:var(--muted);margin-top:2px;}

    /* HISTORICO */
    .hist-filters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
    .hist-input{flex:1;min-width:130px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;color:var(--text);padding:10px 14px;font-size:14px;outline:none;}
    .hist-input:focus{border-color:var(--accent);}
    .hist-row{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:7px;}
    .hist-top{display:flex;justify-content:space-between;align-items:flex-start;}
    .badge{display:inline-block;font-size:10px;font-weight:800;padding:2px 8px;border-radius:5px;letter-spacing:1px;text-transform:uppercase;}
    .badge-in{background:#3B6D1144;color:var(--green2);border:1px solid #3B6D1166;}
    .badge-out{background:#A32D2D44;color:var(--red2);border:1px solid #A32D2D66;}
    .hist-lote{font-size:13px;font-weight:700;margin-top:3px;}
    .hist-meta{font-size:11px;color:var(--muted);margin-top:2px;}
    .hist-obs{font-size:12px;color:var(--muted);margin-top:7px;padding-top:7px;border-top:1px solid var(--border);font-style:italic;}
    .hist-qty{font-size:18px;font-weight:800;margin-left:10px;}

    /* ADMIN */
    .user-row{display:flex;justify-content:space-between;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:7px;}
    .role-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;letter-spacing:1px;text-transform:uppercase;}
    .role-admin{background:#BA751733;color:var(--accent2);border:1px solid #BA751766;}
    .role-op{background:#185FA533;color:var(--blue2);border:1px solid #185FA566;}

    #toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 20px;font-size:13px;font-weight:600;z-index:999;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap;}
    #toast.show{opacity:1;}
    #toast.ok{border-color:var(--green2);color:var(--green2);}
    #toast.err{border-color:var(--red2);color:var(--red2);}
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-icon">🌾</div>
      <h1>LINTER CONTROL</h1>
      <p>Sistema de controle de fardos</p>
    </div>
    <div id="login-err" class="alert alert-err hidden"></div>
    <div class="field"><label>Usuário</label><input id="li-user" type="text" placeholder="ex: admin" autocomplete="username"/></div>
    <div class="field"><label>Senha</label><input id="li-pass" type="password" placeholder="••••••" autocomplete="current-password"/></div>
    <button class="btn btn-accent btn-full" id="btn-login">Entrar</button>
  </div>
</div>

<div id="app-screen" class="hidden">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-icon">🌾</div>
      <div>
        <div class="topbar-title">Linter Control</div>
        <div class="topbar-user" id="topbar-user">—</div>
      </div>
    </div>
    <button class="btn btn-ghost" id="btn-logout" style="padding:7px 14px;font-size:13px;">Sair</button>
  </div>

  <div class="content">
    <div id="tab-mapa">
      <div class="sec-header"><h2>Mapa do armazém</h2><p>Toque num bloco para gerenciar</p></div>
      <div class="legend">
        <div class="leg-item"><div class="leg-dot" style="background:#378ADD"></div>Linter</div>
        <div class="leg-item"><div class="leg-dot" style="background:#639922"></div>Fibrilha</div>
        <div class="leg-item"><div class="leg-dot" style="background:#BA7517"></div>Algodãozinho</div>
        <div class="leg-item"><div class="leg-dot" style="background:#7F77DD"></div>Fibrilha Torre</div>
        <div class="leg-item"><div class="leg-dot" style="background:#22263a;border:1px solid #2e3250"></div>Vazio</div>
      </div>
      <div class="map-wrap"><div class="map-inner" id="warehouse-grid"></div></div>
      <div id="bloco-panel" class="hidden"></div>
    </div>

    <div id="tab-resumo" class="hidden">
      <div class="sec-header"><h2>Resumo do estoque</h2></div>
      <div id="resumo-content"></div>
    </div>

    <div id="tab-historico" class="hidden">
      <div class="sec-header"><h2>Histórico de movimentações</h2></div>
      <div class="hist-filters">
        <input class="hist-input" id="hist-search" placeholder="Buscar lote, produto, usuário…"/>
        <select class="hist-input" id="hist-filter" style="flex:0;min-width:110px;">
          <option value="">Todos</option>
          <option value="ENTRADA">Entradas</option>
          <option value="SAIDA">Saídas</option>
        </select>
      </div>
      <div id="historico-list"></div>
    </div>

    <div id="tab-admin" class="hidden">
      <div class="sec-header"><h2>Administração</h2><p>Gestão de usuários</p></div>
      <div id="admin-content"></div>
    </div>
  </div>

  <nav class="nav-bar">
    <button class="nav-item active" data-tab="mapa"><span class="ni">🗺️</span>Mapa</button>
    <button class="nav-item" data-tab="resumo"><span class="ni">📊</span>Resumo</button>
    <button class="nav-item" data-tab="historico"><span class="ni">📋</span>Histórico</button>
    <button class="nav-item" id="nav-admin" data-tab="admin"><span class="ni">⚙️</span>Admin</button>
  </nav>
</div>
<div id="toast"></div>

<script>
const SUPABASE_URL  = 'https://ajepmbvafshcyhvtysvb.supabase.co';
const SUPABASE_ANON = 'sb_publishable_5N_4oXK1pIre2P_nA50GQQ_njLv8Xwr';
const {createClient} = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

const RUAS  = ['Y','X','W','V','U','T','S','R','Q','P','O','N','M','L','K','J','I','H','G','F','E','D','C','B','A'];
const AVS_E = [1,2,3,4,5,6,7,8];
const AVS_D = [9,10,11,12,13,14,15,16,17];
const PRODS = ['Linter','Fibrilha','Algodãozinho','Fibrilha Torre'];
const PS = {
  'Linter':         {bg:'#185FA530',border:'#378ADD',text:'#85B7EB',dot:'#378ADD'},
  'Fibrilha':       {bg:'#3B6D1130',border:'#639922',text:'#97C459', dot:'#639922'},
  'Algodãozinho':   {bg:'#BA751730',border:'#BA7517',text:'#FAC775', dot:'#BA7517'},
  'Fibrilha Torre': {bg:'#534AB730',border:'#7F77DD',text:'#AFA9EC', dot:'#7F77DD'},
};
const ps = p => PS[p]||{bg:'#22263a',border:'#2e3250',text:'#7a7f9a',dot:'#7a7f9a'};

let currentUser=null,blocos=[],lotes=[],historico=[],usuarios=[];
let selectedBloco=null,actionTab='lotes',selectedLote=null,histSearch='',histFilter='';

function toast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=`show ${type}`;
  clearTimeout(t._t);t._t=setTimeout(()=>t.className='',3000);
}
const getBL  = bid => lotes.filter(l=>l.bloco_id===bid);
const totB   = bid => getBL(bid).reduce((s,l)=>s+l.fardos,0);
const livB   = bid => {const b=blocos.find(x=>x.id===bid);return(b?b.capacidade:140)-totB(bid);};
const mainP  = bid => {const ls=getBL(bid);return ls.length?ls[0].produto:null;};
const findB  = (rua,av) => blocos.find(b=>b.rua===rua&&b.avenida===av);

async function loadAll(){await Promise.all([loadBlocos(),loadHistorico(),loadUsuarios()]);}
async function loadBlocos(){
  const {data:bd}=await sb.from('blocos').select('*').order('id');
  const {data:ld}=await sb.from('lotes').select('*').order('entrada_em');
  blocos=bd||[];lotes=ld||[];
}
async function loadHistorico(){
  const {data}=await sb.from('historico').select('*').order('quando',{ascending:false}).limit(300);
  historico=data||[];
}
async function loadUsuarios(){
  if(currentUser?.role!=='admin')return;
  const {data}=await sb.from('usuarios').select('*').order('nome');
  usuarios=data||[];
}

document.getElementById('li-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('btn-login').addEventListener('click',doLogin);
document.getElementById('btn-logout').addEventListener('click',doLogout);

async function doLogin(){
  const login=document.getElementById('li-user').value.trim();
  const senha=document.getElementById('li-pass').value;
  const err=document.getElementById('login-err');
  err.classList.add('hidden');
  if(!login||!senha){err.textContent='Preencha usuário e senha.';err.classList.remove('hidden');return;}
  document.getElementById('btn-login').disabled=true;
  document.getElementById('btn-login').textContent='Entrando…';
  try{
    const {data,error}=await sb.from('usuarios').select('*').eq('login',login).eq('senha',senha).eq('ativo',true).single();
    if(error||!data){err.textContent='Usuário ou senha incorretos.';err.classList.remove('hidden');return;}
    currentUser=data;
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app-screen').classList.remove('hidden');
    document.getElementById('topbar-user').textContent=data.nome;
    if(data.role!=='admin')document.getElementById('nav-admin').classList.add('hidden');
    await loadAll();showTab('mapa');
  }catch{err.textContent='Erro de conexão.';err.classList.remove('hidden');}
  finally{document.getElementById('btn-login').disabled=false;document.getElementById('btn-login').textContent='Entrar';}
}
function doLogout(){
  currentUser=null;blocos=[];lotes=[];historico=[];
  document.getElementById('app-screen').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('li-pass').value='';
}

document.querySelectorAll('.nav-item').forEach(el=>el.addEventListener('click',()=>showTab(el.dataset.tab)));
function showTab(tab){
  selectedBloco=null;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.tab===tab));
  ['mapa','resumo','historico','admin'].forEach(t=>document.getElementById(`tab-${t}`).classList.toggle('hidden',t!==tab));
  if(tab==='mapa')      renderMapa();
  if(tab==='resumo')    renderResumo();
  if(tab==='historico') renderHistorico();
  if(tab==='admin')     renderAdmin();
}

function renderMapa(){
  const grid=document.getElementById('warehouse-grid');
  let h=`<div class="av-row">`;
  AVS_E.forEach(a=>h+=`<div class="av-num">${a}</div>`);
  h+=`<div class="sep-cell"></div>`;
  AVS_D.forEach(a=>h+=`<div class="av-num">${a}</div>`);
  h+=`</div>`;
  RUAS.forEach(rua=>{
    h+=`<div class="rua-row"><div class="rua-lbl">${rua}</div>`;
    [...AVS_E,null,...AVS_D].forEach(av=>{
      if(av===null){h+=`<div class="sep-cell"></div>`;return;}
      const b=findB(rua,av);
      const bid=b?b.id:null;
      const tot=bid?totB(bid):0;
      const prod=bid?mainP(bid):null;
      const st=prod?ps(prod):{bg:'#22263a',border:'#2e3250',text:'#7a7f9a'};
      const isSel=selectedBloco&&b&&selectedBloco===b.id;
      const ls=bid?getBL(bid):[];
      h+=`<div class="cell${isSel?' selected':''}" data-rua="${rua}" data-av="${av}" style="background:${st.bg};border-color:${st.border}">`;
      if(tot>0&&ls.length){
        h+=`<div class="cell-lote" style="color:${st.text}">${ls[0].lote}</div>`;
        h+=`<div class="cell-prod" style="color:${st.text}">${prod}</div>`;
        h+=`<div class="cell-qty" style="color:${st.text}">${tot}</div>`;
      }
      h+=`</div>`;
    });
    h+=`</div>`;
  });
  h+=`<div class="inicio-bar">▲  INÍCIO / ENTRADA  ▲</div>`;
  grid.innerHTML=h;
  grid.querySelectorAll('.cell').forEach(el=>{
    el.addEventListener('click',()=>{
      const b=findB(el.dataset.rua,parseInt(el.dataset.av));
      if(!b){toast('Bloco não cadastrado no banco.','err');return;}
      selectedBloco=b.id;actionTab='lotes';selectedLote=null;
      renderMapa();renderBlocoPanel();
    });
  });
  const panel=document.getElementById('bloco-panel');
  if(!selectedBloco){panel.classList.add('hidden');return;}
  renderBlocoPanel();
}

function renderBlocoPanel(){
  const panel=document.getElementById('bloco-panel');
  const b=blocos.find(x=>x.id===selectedBloco);
  if(!b){panel.classList.add('hidden');return;}
  const tot=totB(b.id),livre=livB(b.id);
  const p=Math.min(tot/b.capacidade,1);
  const prod=mainP(b.id);
  const cor=prod?ps(prod).dot:'#7a7f9a';
  panel.classList.remove('hidden');
  panel.innerHTML=`
    <div class="panel">
      <div class="panel-head">
        <div>
          <div class="panel-title">Rua ${b.rua} — Avenida ${b.avenida}</div>
          <div class="panel-sub">${tot}/${b.capacidade} fardos · ${livre} livres</div>
        </div>
        <button class="btn btn-ghost" id="btn-close-panel" style="padding:6px 12px;font-size:12px;">✕</button>
      </div>
      <div class="prog-wrap"><div class="prog-fill" style="width:${p*100}%;background:${cor}"></div></div>
      <div class="action-tabs">
        <button class="action-tab${actionTab==='lotes'?' active':''}" data-at="lotes">Lotes</button>
        <button class="action-tab${actionTab==='entrada'?' active':''}" data-at="entrada">Entrada</button>
        <button class="action-tab${actionTab==='saida'?' active':''}" data-at="saida">Saída</button>
      </div>
      <div id="panel-body"></div>
    </div>`;
  document.getElementById('btn-close-panel').onclick=()=>{selectedBloco=null;panel.classList.add('hidden');renderMapa();};
  panel.querySelectorAll('.action-tab').forEach(el=>{
    el.addEventListener('click',()=>{actionTab=el.dataset.at;selectedLote=null;renderBlocoPanel();});
  });
  renderPanelBody(b,livre);
}

function renderPanelBody(b,livre){
  const body=document.getElementById('panel-body');
  const ls=getBL(b.id);
  if(actionTab==='lotes'){
    if(!ls.length){body.innerHTML=`<div class="empty-msg">Bloco vazio.</div>`;return;}
    body.innerHTML=ls.map(l=>{
      const st=ps(l.produto);
      return `<div class="lote-row" style="border-left:4px solid ${st.dot}">
        <div>
          <div class="lote-name">${l.lote}</div>
          <div class="lote-meta" style="color:${st.dot};font-weight:600">${l.produto}</div>
          <div class="lote-meta">${new Date(l.entrada_em).toLocaleString('pt-BR')}</div>
        </div>
        <div class="lote-qty">${l.fardos}</div>
      </div>`;
    }).join('');
  }
  if(actionTab==='entrada'){
    body.innerHTML=`
      <div class="ff"><label>Número do lote</label><input id="f-lote" placeholder="ex: LINTER2025-L01"></div>
      <div class="ff"><label>Produto</label>
        <select id="f-prod"><option value="">Selecione o produto…</option>${PRODS.map(p=>`<option>${p}</option>`).join('')}</select>
      </div>
      <div class="ff"><label>Quantidade de fardos (máx. ${livre})</label><input id="f-fardos" type="number" min="1" max="${livre}" placeholder="${livre}"></div>
      <div class="ff"><label>Observação (opcional)</label><textarea id="f-obs" placeholder="Ex: Carga do caminhão ABC-1234, campo norte…"></textarea></div>
      <button class="btn btn-green btn-full" id="btn-entrada">📥 Registrar Entrada</button>`;
    document.getElementById('btn-entrada').onclick=async()=>{
      const lote=document.getElementById('f-lote').value.trim().toUpperCase();
      const prod=document.getElementById('f-prod').value;
      const n=parseInt(document.getElementById('f-fardos').value);
      const obs=document.getElementById('f-obs').value.trim();
      if(!lote) return toast('Informe o número do lote.','err');
      if(!prod) return toast('Selecione o produto.','err');
      if(!n||n<=0) return toast('Quantidade inválida.','err');
      if(n>livre) return toast(`Espaço insuficiente. Livre: ${livre}.`,'err');
      if(ls.find(l=>l.lote===lote)) return toast('Lote já existe neste bloco.','err');
      document.getElementById('btn-entrada').disabled=true;
      try{
        const {error:e1}=await sb.from('lotes').insert({bloco_id:b.id,lote,produto:prod,fardos:n});
        if(e1) throw e1;
        await sb.from('historico').insert({
          acao:'ENTRADA',bloco_id:b.id,rua:b.rua,avenida:b.avenida,
          lote,produto:prod,fardos:n,observacao:obs||null,
          usuario_nome:currentUser.nome,usuario_id:currentUser.id,
          quando:new Date().toISOString()
        });
        await loadBlocos();await loadHistorico();
        toast(`✅ ${n} fardos de ${lote} registrados!`);
        actionTab='lotes';renderMapa();renderBlocoPanel();
      }catch{toast('Erro ao salvar. Tente novamente.','err');}
      finally{const btn=document.getElementById('btn-entrada');if(btn)btn.disabled=false;}
    };
  }
  if(actionTab==='saida'){
    if(!ls.length){body.innerHTML=`<div class="empty-msg">Nenhum lote para remover.</div>`;return;}
    const selObj=selectedLote?ls.find(l=>l.id===selectedLote):null;
    body.innerHTML=ls.map(l=>{
      const st=ps(l.produto);
      return `<div class="lote-row${selectedLote===l.id?' sel':''}" data-lid="${l.id}" style="border-left:4px solid ${st.dot}">
        <div>
          <div class="lote-name">${l.lote}</div>
          <div class="lote-meta" style="color:${st.dot};font-weight:600">${l.produto}</div>
        </div>
        <div class="lote-qty">${l.fardos}</div>
      </div>`;
    }).join('')+
    (selObj?`
      <div class="ff" style="margin-top:10px"><label>Quantidade a retirar (máx. ${selObj.fardos})</label>
        <input id="f-sqtd" type="number" min="1" max="${selObj.fardos}" placeholder="${selObj.fardos}">
      </div>
      <div class="ff"><label>Observação (opcional)</label>
        <textarea id="f-sobs" placeholder="Ex: Enviado para processamento, NF 12345…"></textarea>
      </div>
      <button class="btn btn-red btn-full" id="btn-saida">📤 Registrar Saída</button>`:'');
    body.querySelectorAll('[data-lid]').forEach(el=>{
      el.addEventListener('click',()=>{selectedLote=el.dataset.lid;renderBlocoPanel();});
    });
    if(selObj){
      document.getElementById('btn-saida').onclick=async()=>{
        const n=parseInt(document.getElementById('f-sqtd').value);
        const obs=document.getElementById('f-sobs').value.trim();
        if(!n||n<=0) return toast('Quantidade inválida.','err');
        if(n>selObj.fardos) return toast(`Máximo: ${selObj.fardos}.`,'err');
        document.getElementById('btn-saida').disabled=true;
        try{
          if(n===selObj.fardos){await sb.from('lotes').delete().eq('id',selObj.id);}
          else{await sb.from('lotes').update({fardos:selObj.fardos-n}).eq('id',selObj.id);}
          await sb.from('historico').insert({
            acao:'SAIDA',bloco_id:b.id,rua:b.rua,avenida:b.avenida,
            lote:selObj.lote,produto:selObj.produto,fardos:n,observacao:obs||null,
            usuario_nome:currentUser.nome,usuario_id:currentUser.id,
            quando:new Date().toISOString()
          });
          await loadBlocos();await loadHistorico();
          toast(`✅ Saída de ${n} fardos registrada!`);
          selectedLote=null;actionTab='lotes';renderMapa();renderBlocoPanel();
        }catch{toast('Erro ao salvar. Tente novamente.','err');}
        finally{const btn=document.getElementById('btn-saida');if(btn)btn.disabled=false;}
      };
    }
  }
}

function renderResumo(){
  const el=document.getElementById('resumo-content');
  const totF=lotes.reduce((s,l)=>s+l.fardos,0);
  const cap=blocos.reduce((s,b)=>s+b.capacidade,0);
  const ocup=blocos.filter(b=>totB(b.id)>0).length;
  const pct=cap?Math.round(totF/cap*100):0;
  const porP={};
  lotes.forEach(l=>{if(!porP[l.produto])porP[l.produto]=0;porP[l.produto]+=l.fardos;});
  el.innerHTML=`
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Total fardos</div><div class="stat-value" style="color:var(--accent2)">${totF}</div><div class="stat-sub">de ${cap} cap.</div></div>
      <div class="stat-card"><div class="stat-label">Ocupação</div><div class="stat-value" style="color:var(--accent2)">${pct}%</div><div class="stat-sub">do armazém</div></div>
      <div class="stat-card"><div class="stat-label">Blocos ocupados</div><div class="stat-value">${ocup}</div><div class="stat-sub">de ${blocos.length}</div></div>
      <div class="stat-card"><div class="stat-label">Lotes ativos</div><div class="stat-value">${lotes.length}</div><div class="stat-sub">no estoque</div></div>
    </div>
    <div class="sec-title">Por produto</div>
    ${Object.entries(porP).sort((a,b)=>b[1]-a[1]).map(([prod,qtd])=>{
      const st=ps(prod);
      return `<div style="display:flex;justify-content:space-between;align-items:center;background:var(--card);border:1px solid var(--border);border-left:4px solid ${st.dot};border-radius:10px;padding:12px 14px;margin-bottom:7px">
        <div style="font-size:14px;font-weight:700;color:${st.dot}">${prod}</div>
        <div style="font-size:18px;font-weight:800;color:${st.dot}">${qtd} <span style="font-size:11px;color:var(--muted)">fardos</span></div>
      </div>`;
    }).join('')}`;
}

function renderHistorico(){
  const inp=document.getElementById('hist-search');
  const sel=document.getElementById('hist-filter');
  inp.value=histSearch;sel.value=histFilter;
  inp.oninput=e=>{histSearch=e.target.value;renderHistList();};
  sel.onchange=e=>{histFilter=e.target.value;renderHistList();};
  renderHistList();
}
function renderHistList(){
  const el=document.getElementById('historico-list');
  const q=histSearch.toUpperCase();
  const lista=historico.filter(h=>{
    const mq=!q||h.lote?.toUpperCase().includes(q)||h.produto?.toUpperCase().includes(q)||h.usuario_nome?.toUpperCase().includes(q)||String(h.rua||'').toUpperCase().includes(q)||String(h.avenida||'').includes(q);
    return mq&&(!histFilter||h.acao===histFilter);
  });
  if(!lista.length){el.innerHTML=`<div class="empty-msg">Nenhum registro encontrado.</div>`;return;}
  el.innerHTML=lista.slice(0,150).map(h=>{
    const st=ps(h.produto);
    return `<div class="hist-row">
      <div class="hist-top">
        <div style="flex:1">
          <span class="badge ${h.acao==='ENTRADA'?'badge-in':'badge-out'}">${h.acao}</span>
          <div class="hist-lote">${h.lote} <span style="font-size:11px;color:${st.dot};font-weight:600">${h.produto||''}</span></div>
          <div class="hist-meta">📍 Rua ${h.rua||'—'} · Av ${h.avenida||'—'}</div>
          <div class="hist-meta">👤 <strong>${h.usuario_nome}</strong></div>
          <div class="hist-meta">🕐 ${new Date(h.quando).toLocaleString('pt-BR')}</div>
        </div>
        <div class="hist-qty" style="color:${h.acao==='ENTRADA'?'var(--green2)':'var(--red2)'}">${h.acao==='ENTRADA'?'+':'-'}${h.fardos}</div>
      </div>
      ${h.observacao?`<div class="hist-obs">📝 ${h.observacao}</div>`:''}
    </div>`;
  }).join('');
}

function renderAdmin(){
  const el=document.getElementById('admin-content');
  el.innerHTML=`
    <div class="sec-title">Usuários cadastrados</div>
    ${usuarios.map(u=>`
      <div class="user-row">
        <div>
          <div style="font-size:14px;font-weight:700">${u.nome}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px">Login: ${u.login}</div>
        </div>
        <span class="role-badge ${u.role==='admin'?'role-admin':'role-op'}">${u.role}</span>
      </div>`).join('')}
    <div class="divider"></div>
    <div class="sec-title">Adicionar usuário</div>
    <div class="ff"><label>Nome completo</label><input id="nu-nome" placeholder="Ex: João Silva"></div>
    <div class="ff"><label>Login</label><input id="nu-login" placeholder="Ex: joao"></div>
    <div class="ff"><label>Senha</label><input id="nu-senha" type="password" placeholder="••••••"></div>
    <div class="ff"><label>Perfil</label>
      <select id="nu-role"><option value="operador">Operador</option><option value="admin">Administrador</option></select>
    </div>
    <button class="btn btn-accent btn-full" id="btn-add-user">Adicionar usuário</button>`;
  document.getElementById('btn-add-user').onclick=async()=>{
    const nome=document.getElementById('nu-nome').value.trim();
    const login=document.getElementById('nu-login').value.trim().toLowerCase();
    const senha=document.getElementById('nu-senha').value;
    const role=document.getElementById('nu-role').value;
    if(!nome||!login||!senha) return toast('Preencha todos os campos.','err');
    document.getElementById('btn-add-user').disabled=true;
    try{
      const {error}=await sb.from('usuarios').insert({nome,login,senha,role});
      if(error){toast('Erro: login já existe.','err');return;}
      await loadUsuarios();toast('✅ Usuário adicionado!');renderAdmin();
    }catch{toast('Erro ao salvar.','err');}
    finally{const btn=document.getElementById('btn-add-user');if(btn)btn.disabled=false;}
  };
}
</script>
</body>
</html>
